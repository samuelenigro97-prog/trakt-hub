name: keep-warm
# Pinga l'addon ogni ~10 min così Render free non lo spegne (niente cold-start).
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping manifest
        run: |
          curl -sS -m 40 -o /dev/null -w "manifest HTTP %{http_code} | %{time_total}s\n" \
            https://stremio-trakt-addon-m4gw.onrender.com/manifest.json
